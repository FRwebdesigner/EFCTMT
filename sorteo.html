  <div class="contact-container">
    <h2>Participá de nuestros Sorteos Mensuales completando con tus datos todos los campos de este formulario</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="hidden" name="access_key" value="1b705a08-a3aa-48b6-9dc0-4ad5fff99a6c">
        <input type="text" id="name" name="name" placeholder="Tu nombre" required>
      </div>

      <div class="form-group">
        <label for="name">Apellido</label>
        <input type="text" id="name" name="name" placeholder="Tu apellido" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Tu @email.com" required>
      </div>

      <div class="form-group">
        <label for="email">DNI</label>
        <input type="text" id="number" name="number" placeholder="Tu Numero de DNI" required>
      </div>

      <div class="form-group">
        <label for="email">Telefono de Contacto</label>
        <input type="tel" id="number" name="number" placeholder="Tu Numero de Telefono" required>
      </div>

      <button type="submit">Participar</button>

      <div class="message" id="formMessage"></div>
    </form>
    <div class="sorteo-poster">
      <p>Sorteo Marzo 2026</p>
    <img src="img/sorteo2.jpeg" 
         alt="Sorteo discos Ozzy Osbourne encuadrados - Efecto Metal">
</div>
